name: Guard

# Server-side failsafe. Runs on every PR into main, regardless of which tool/model/human pushed.
# Gate 1 (uid):   blocks Godot scene re-serialization (the #4 uid-regeneration class).
# Gate 2 (parse): blocks PRs that do not load cleanly (the ClothSway type-revert class, broken refs).

on:
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- Gate 1: uid regeneration (pure bash, no dependencies) ----
      - name: uid gate
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          # Only a CHANGED uid for the SAME path == Godot re-serialization (the 188-line incident).
          # Removing/adding a resource outright is legitimate and allowed.
          DIFF=$(git diff "$BASE" HEAD -- '*.tscn' '*.tres')
          BAD=""
          removed=$(printf '%s\n' "$DIFF" | grep -E '^-.*uid://.*path=' || true)
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            p=$(printf '%s' "$line" | grep -oE 'path="[^"]+"')
            u=$(printf '%s' "$line" | grep -oE 'uid://[a-z0-9]+')
            [ -z "$p" ] && continue
            added=$(printf '%s\n' "$DIFF" | grep -F "$p" | grep -E '^\+.*uid://' || true)
            if [ -n "$added" ]; then
              au=$(printf '%s' "$added" | grep -oE 'uid://[a-z0-9]+' | head -1)
              [ "$au" != "$u" ] && BAD="${BAD}${p}: uid ${u} -> ${au}\n"
            fi
          done < <(printf '%s\n' "$removed")
          if [ -n "$BAD" ]; then
            echo "::error::uid changed for an existing resource (same path, new uid = re-serialization). Edit the .tscn as TEXT; never re-save the scene through the editor."
            printf '%b' "$BAD"
            exit 1
          fi
          echo "uid gate OK (re-serialization only; resource add/remove allowed)"

      # ---- Gate 2: Godot headless parse/import ----
      # URL verified working: 4.6.3-stable Linux asset returns HTTP 302 (exists).
      - name: Install Godot
        env:
          GODOT_VERSION: 4.6.3-stable
        run: |
          curl -fL "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -o godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: parse gate
        run: |
          set +e
          godot --headless --import --path . > import.log 2>&1
          godot --headless --quit-after 5 --path . > run.log 2>&1
          cat import.log run.log
          if grep -E 'SCRIPT ERROR|Parse Error|Cannot infer|Failed to load' import.log run.log; then
            echo "::error::Godot reported parse/load errors - the project does not load cleanly (e.g. a reverted type fix or broken reference)."
            exit 1
          fi
          echo "parse gate OK"
